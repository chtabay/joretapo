<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JORETAPO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }

  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: flex; }

  /* ── Title ── */
  #screen-title { flex-direction: column; align-items: center; justify-content: center; gap: 24px; background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 70%); }
  #screen-title h1 { font-size: 64px; letter-spacing: 12px; color: #8ab4f8; text-transform: uppercase; }
  #screen-title .title-sub { font-size: 14px; color: #666; letter-spacing: 4px; text-transform: uppercase; }
  .title-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }

  /* ── Setup ── */
  #screen-setup { justify-content: center; align-items: center; overflow-y: auto; }
  #setup-container { width: 100%; max-width: 600px; padding: 32px 24px; }
  .setup-screen { display: flex; flex-direction: column; gap: 20px; }
  .setup-header { text-align: center; }
  .setup-header h1 { font-size: 32px; color: #8ab4f8; margin-bottom: 4px; }
  .setup-subtitle { color: #888; font-size: 14px; }
  .setup-section { display: flex; flex-direction: column; gap: 8px; }
  .setup-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
  .nb-joueurs-selector { display: flex; gap: 8px; }
  .nb-btn { flex: 1; padding: 10px; border: 1px solid #334; border-radius: 6px; background: transparent; color: #ccc; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .nb-btn:hover { background: #223; }
  .nb-btn.active { background: #1e3a5f; border-color: #5a8ab4; color: #8ab4f8; }
  .joueurs-list { display: flex; flex-direction: column; gap: 8px; }
  .joueur-card { background: rgba(255,255,255,0.03); border: 1px solid #223; border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .joueur-card-row { display: flex; gap: 8px; align-items: center; }
  .joueur-nom { flex: 1; background: transparent; border: 1px solid #334; border-radius: 4px; padding: 6px 10px; color: #e0e0e0; font-size: 14px; }
  .joueur-nom:focus { outline: none; border-color: #5a8ab4; }
  .joueur-color { width: 36px; height: 32px; border: none; border-radius: 4px; cursor: pointer; padding: 0; }
  .joueur-ethnie { flex: 1; background: #111; border: 1px solid #334; border-radius: 4px; padding: 6px 10px; color: #ccc; font-size: 13px; }
  .draft-progress { display: flex; gap: 8px; flex-wrap: wrap; }
  .draft-slot { flex: 1; min-width: 120px; padding: 8px 12px; border: 1px solid #334; border-radius: 6px; display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .draft-slot.active { border-color: #5a8ab4; background: rgba(90,138,180,0.1); }
  .draft-slot.done { opacity: 0.6; }
  .draft-slot-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .draft-slot-quartier { font-size: 11px; color: #888; margin-left: auto; }
  .draft-player-indicator { display: inline-block; padding: 2px 10px; border-radius: 4px; font-weight: 700; color: #fff; }
  .quartiers-grid { display: flex; flex-direction: column; gap: 6px; }
  .quartier-pick-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: 1px solid; border-radius: 6px; background: rgba(255,255,255,0.02); color: #e0e0e0; cursor: pointer; text-align: left; transition: background 0.15s; }
  .quartier-pick-btn:not(.taken):hover { background: rgba(255,255,255,0.06); }
  .quartier-pick-btn.taken { cursor: default; }
  .qpb-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
  .qpb-info { display: flex; flex-direction: column; }
  .qpb-info strong { font-size: 14px; }
  .qpb-info span { font-size: 11px; color: #888; }
  .confirm-players { display: flex; flex-direction: column; gap: 8px; }
  .confirm-card { background: rgba(255,255,255,0.03); border: 1px solid #223; border-radius: 6px; padding: 12px 16px; }
  .confirm-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .confirm-details { font-size: 13px; color: #aaa; }
  .confirm-resources { font-size: 12px; color: #666; margin-top: 4px; font-family: monospace; }
  .confirm-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }

  /* ── Buttons ── */
  .btn-primary { padding: 12px 32px; background: #1e3a5f; border: 1px solid #5a8ab4; border-radius: 6px; color: #8ab4f8; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s; letter-spacing: 1px; }
  .btn-primary:hover { background: #2a4a7f; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary { padding: 12px 32px; background: transparent; border: 1px solid #445; border-radius: 6px; color: #aaa; font-size: 16px; cursor: pointer; transition: background 0.15s; }
  .btn-secondary:hover { background: #223; }

  /* ── Game Screen ── */
  #screen-game { flex-direction: column; }
  #map-container { position: absolute; inset: 0; cursor: grab; }
  #map-container.dragging { cursor: grabbing; }
  svg { display: block; }

  /* ── Overlays ── */
  .overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
  .overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 12px rgba(138,180,248,0.15); } 50% { box-shadow: 0 0 24px rgba(138,180,248,0.35); } }
  .overlay:not(.hidden) { animation: fadeIn 0.25s ease; }
  .overlay:not(.hidden) .reveal-container, .overlay:not(.hidden) .nego-container, .overlay:not(.hidden) .turnend-container, .overlay:not(.hidden) .modal-content { animation: slideUp 0.3s ease; }

  /* ── Curtain ── */
  #curtain { background: #0a0a1a; flex-direction: column; gap: 24px; }
  #curtain:not(.hidden) { animation: fadeIn 0.4s ease; }
  .curtain-phase { font-size: 14px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
  .curtain-label { font-size: 18px; color: #888; }
  .curtain-player { font-size: 48px; font-weight: 700; text-shadow: 0 0 40px currentColor; }

  /* ── Order Panel ── */
  #order-panel { position: fixed; top: 0; right: 0; width: 340px; height: 100vh; background: rgba(10,10,30,0.96); border-left: 1px solid #334; z-index: 50; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; backdrop-filter: blur(8px); animation: slideRight 0.3s ease; }
  #order-panel.hidden { display: none; }
  .op-header { padding-bottom: 8px; border-bottom: 2px solid; margin-bottom: 8px; }
  .op-header strong { font-size: 18px; display: block; }
  .op-header span { font-size: 12px; color: #888; }
  .op-resources { display: flex; gap: 12px; padding: 8px 0; font-size: 14px; }
  .op-res { background: #1a1a2e; padding: 4px 10px; border-radius: 4px; }
  .op-budget { font-size: 13px; color: #8ab4f8; padding: 4px 0 12px; }
  .op-actions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .op-btn { padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid #334; border-radius: 6px; color: #ccc; font-size: 14px; cursor: pointer; text-align: left; transition: background 0.15s; }
  .op-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); }
  .op-btn:disabled { opacity: 0.3; cursor: default; }
  .op-list { flex: 1; display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .op-empty { color: #555; font-size: 13px; font-style: italic; padding: 8px 0; }
  .op-order { display: flex; justify-content: space-between; align-items: center; background: #1a1a2e; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
  .op-remove { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; padding: 2px 6px; }
  .op-hint { font-size: 11px; color: #666; font-style: italic; padding: 4px 2px; border-top: 1px solid #223; margin-top: 4px; }
  .op-submit { margin-top: auto; width: 100%; }

  /* ── Modal ── */
  #order-modal { background: rgba(0,0,0,0.7); z-index: 200; }
  .modal-content { background: #151528; border: 1px solid #445; border-radius: 10px; padding: 20px; width: 90%; max-width: 420px; }
  .modal-body h3 { font-size: 18px; color: #8ab4f8; margin-bottom: 12px; }
  .modal-body label { display: block; font-size: 12px; text-transform: uppercase; color: #888; margin-top: 10px; margin-bottom: 4px; }
  .modal-body select, .modal-body input[type="number"] { width: 100%; padding: 8px 10px; background: #0d0d1e; border: 1px solid #334; border-radius: 4px; color: #e0e0e0; font-size: 14px; }
  .modal-body select:focus, .modal-body input:focus { outline: none; border-color: #5a8ab4; }
  .modal-prereq { font-size: 12px; color: #e74c3c; padding: 4px 0; min-height: 18px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .modal-actions .btn-primary, .modal-actions .btn-secondary { padding: 8px 20px; font-size: 14px; }

  /* ── Reveal Overlay ── */
  #reveal-ov, #negotiation-ov, #turnend-ov { background: rgba(5,5,20,0.95); flex-direction: column; }
  .reveal-container, .nego-container, .turnend-container { width: 90%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; }
  .reveal-title, .nego-title { font-size: 24px; color: #8ab4f8; margin-bottom: 16px; text-align: center; }
  .reveal-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 8px; }
  .reveal-line { padding: 6px 10px; font-size: 13px; border-radius: 4px; background: rgba(255,255,255,0.02); animation: slideUp 0.2s ease both; }
  .reveal-line:nth-child(1) { animation-delay: 0.05s; }
  .reveal-line:nth-child(2) { animation-delay: 0.1s; }
  .reveal-line:nth-child(3) { animation-delay: 0.15s; }
  .reveal-line:nth-child(4) { animation-delay: 0.2s; }
  .reveal-line:nth-child(5) { animation-delay: 0.25s; }
  .reveal-line:nth-child(n+6) { animation-delay: 0.3s; }
  .reveal-line[data-type="conflict"] { background: rgba(231,76,60,0.12); border-left-color: #e74c3c !important; font-weight: 600; }
  .reveal-line[data-type="flic"] { background: rgba(52,152,219,0.12); border-left-color: #3498db !important; }
  .reveal-line[data-type="warn"] { background: rgba(243,156,18,0.08); }
  .reveal-icon { margin-right: 6px; }
  .reveal-empty { color: #555; font-style: italic; text-align: center; padding: 24px; }
  .reveal-summary { margin-top: 16px; padding-top: 12px; border-top: 1px solid #334; }
  .reveal-player { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .reveal-btn { text-align: center; margin-top: 20px; }
  .victory-banner { font-size: 22px; font-weight: 700; text-align: center; padding: 20px; margin-top: 12px; animation: pulseGlow 2s infinite; border-radius: 8px; background: rgba(138,180,248,0.05); }

  /* ── Election ── */
  .election-container { width: 90%; max-width: 520px; max-height: 80vh; display: flex; flex-direction: column; overflow-y: auto; }
  .election-title { font-size: 26px; color: #f8c48a; margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
  .election-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 16px; }
  .vote-candidates { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .vote-candidate { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 2px solid #334; border-radius: 8px; background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.2s; }
  .vote-candidate:hover { background: rgba(255,255,255,0.06); border-color: #556; }
  .vote-candidate.selected { border-color: #f8c48a; background: rgba(248,196,138,0.08); }
  .vote-candidate-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .vote-candidate-name { font-size: 16px; font-weight: 600; }
  .vote-candidate-info { font-size: 12px; color: #888; margin-left: auto; }
  .election-results { display: flex; flex-direction: column; gap: 6px; }
  .election-result-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; background: rgba(255,255,255,0.02); }
  .election-bar { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .election-winner-banner { font-size: 20px; font-weight: 700; text-align: center; padding: 16px; margin-top: 12px; color: #f8c48a; animation: pulseGlow 2s infinite; border-radius: 8px; background: rgba(248,196,138,0.05); }

  /* ── Draft Magouille ── */
  .draft-card-list { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; padding-right: 4px; }
  .draft-card { display: flex; gap: 10px; padding: 10px; border: 2px solid #334; border-radius: 8px; background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.2s; position: relative; }
  .draft-card:hover { background: rgba(255,255,255,0.06); border-color: #556; }
  .draft-card.draft-selected { border-color: #9b59b6; background: rgba(155,89,182,0.1); }
  .draft-card-img { width: 64px; height: 48px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .draft-card-placeholder { display: flex; align-items: center; justify-content: center; background: #1a1a2e; font-size: 24px; }
  .draft-card-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .draft-card-info strong { font-size: 13px; color: #eee; }
  .draft-card-desc { font-size: 11px; color: #888; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .draft-card-cost { font-size: 11px; color: #f8c48a; }
  .draft-check { position: absolute; top: 6px; right: 8px; color: #9b59b6; font-size: 18px; font-weight: 700; }

  /* ── Magouille Play ── */
  .op-btn-magouille { background: rgba(155,89,182,0.12) !important; border-color: #9b59b6 !important; color: #c39bd3 !important; }
  .op-btn-magouille:hover { background: rgba(155,89,182,0.2) !important; }
  .magouille-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #c39bd3; padding: 12px 24px; border-radius: 8px; border: 1px solid #9b59b6; font-weight: 600; z-index: 10000; animation: slideUp 0.4s ease, fadeIn 0.4s ease; pointer-events: none; }

  /* ── Mayor ── */
  .op-btn-mayor { background: rgba(248,196,138,0.12) !important; border-color: #f8c48a !important; color: #f8c48a !important; }
  .op-btn-mayor:hover { background: rgba(248,196,138,0.2) !important; }
  .mayor-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2a1a3e; color: #f8c48a; padding: 12px 24px; border-radius: 8px; border: 1px solid #f8c48a; font-weight: 600; z-index: 10000; animation: slideUp 0.4s ease, fadeIn 0.4s ease; pointer-events: none; }

  /* ── Negotiation ── */
  .nego-container { align-items: center; gap: 24px; }
  .nego-title { font-size: 28px; }
  .nego-sub { color: #888; font-size: 14px; text-align: center; max-width: 400px; }

  /* ── Panels ── */
  .panel-header { display: flex; justify-content: space-between; align-items: center; }
  .panel-toggle { background: none; border: 1px solid #445; color: #888; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; flex-shrink: 0; }
  .panel-toggle:hover { background: #334; color: #ccc; }
  .panel-body { transition: max-height 0.25s ease, opacity 0.2s; overflow: hidden; }
  .panel-body.collapsed { max-height: 0 !important; opacity: 0; margin-top: 0 !important; }

  #info-panel { position: fixed; top: 16px; right: 16px; width: 300px; background: rgba(10,10,30,0.92); border: 1px solid #334; border-radius: 8px; padding: 16px; z-index: 10; backdrop-filter: blur(8px); transition: opacity 0.2s; max-height: calc(100vh - 32px); overflow-y: auto; }
  #info-panel.hidden { opacity: 0; pointer-events: none; }
  #info-panel h2 { font-size: 16px; color: #8ab4f8; margin-bottom: 4px; }
  #info-panel .id-badge { display: inline-block; background: #334; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
  #info-panel .quartier-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  #info-panel .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; border-bottom: 1px solid #222; }
  #info-panel .stat-row:last-child { border-bottom: none; }
  #info-panel .stat-label { color: #888; }
  #info-panel .stat-value { font-weight: 600; font-family: monospace; }
  #info-panel .indices { display: flex; gap: 12px; margin: 8px 0; }
  #info-panel .index-box { flex: 1; text-align: center; padding: 6px; border-radius: 4px; font-size: 18px; font-weight: 700; }
  #info-panel .index-label { font-size: 10px; text-transform: uppercase; color: #888; margin-top: 2px; }
  #info-panel .adj-list { margin-top: 8px; font-size: 12px; }
  #info-panel .adj-list span { display: inline-block; background: #223; padding: 1px 6px; border-radius: 3px; margin: 2px; cursor: pointer; transition: background 0.15s; }
  #info-panel .adj-list span:hover { background: #445; }
  #info-panel .gang-info { margin-top: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 12px; }
  #info-panel .gang-name { font-weight: 700; color: #f8c48a; margin-bottom: 4px; }
  #info-panel .facilite-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; background: #3a2a10; color: #f8d48a; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
  .section-title { font-size: 11px; text-transform: uppercase; color: #666; margin-top: 10px; margin-bottom: 4px; letter-spacing: 1px; }

  #legend { position: fixed; bottom: 16px; left: 16px; background: rgba(10,10,30,0.92); border: 1px solid #334; border-radius: 8px; padding: 12px 16px; z-index: 10; font-size: 11px; max-height: calc(100vh - 32px); overflow-y: auto; backdrop-filter: blur(8px); }
  #legend h3 { font-size: 13px; margin-bottom: 0; color: #aaa; }
  #legend .panel-body { margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 2px 0; cursor: pointer; padding: 2px 4px; border-radius: 3px; transition: background 0.15s; }
  .legend-item:hover { background: rgba(255,255,255,0.06); }
  .legend-item.active { background: rgba(255,255,255,0.1); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .legend-info { color: #666; font-size: 10px; margin-left: auto; }

  #stats { position: fixed; top: 16px; left: 16px; background: rgba(10,10,30,0.92); border: 1px solid #334; border-radius: 8px; padding: 12px 16px; z-index: 10; font-size: 13px; backdrop-filter: blur(8px); }
  #stats h3 { font-size: 14px; margin-bottom: 4px; color: #8ab4f8; }
  .hud-phase { font-size: 11px; color: #888; margin-bottom: 6px; }
  .hud-players { display: flex; flex-direction: column; gap: 3px; }
  .hud-player { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .hud-player-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hud-player-pts { margin-left: auto; color: #8ab4f8; font-weight: 600; }
  .hud-player-gold { color: #f8c48a; font-family: monospace; min-width: 50px; text-align: right; }

  path.zone { transition: opacity 0.15s, stroke-width 0.15s; cursor: pointer; }
  path.zone:hover { opacity: 1 !important; stroke-width: 2; }
  path.zone.selected { stroke: #fff; stroke-width: 2.5; opacity: 1 !important; }
  path.zone.adjacent { stroke: #ffcc00; stroke-width: 2; opacity: 1 !important; }
  path.zone.dimmed { opacity: 0.25 !important; }
  path.zone.quartier-highlight { opacity: 1 !important; stroke-width: 1.5; }
</style>
</head>
<body>

<div id="screen-title" class="screen active">
  <h1>JORETAPO</h1>
  <div class="title-sub">Jeu de plateau satirique — NYC &amp; NJ</div>
  <div class="title-buttons">
    <button class="btn-primary" id="btn-new-game">Nouvelle partie</button>
    <button class="btn-secondary" id="btn-continue" style="display:none">Continuer</button>
    <button class="btn-secondary" id="btn-map-only">Explorer la carte</button>
  </div>
</div>

<div id="screen-setup" class="screen">
  <div id="setup-container"></div>
</div>

<div id="screen-game" class="screen">
  <div id="map-container"></div>

  <div id="stats"><h3>JORETAPO</h3><div id="stats-content">Chargement...</div></div>

  <div id="legend">
    <div class="panel-header">
      <h3>Quartiers de jeu</h3>
      <button class="panel-toggle" onclick="this.closest('#legend').querySelector('.panel-body').classList.toggle('collapsed'); this.textContent = this.textContent === '\u2212' ? '+' : '\u2212';">&minus;</button>
    </div>
    <div class="panel-body" id="legend-items"></div>
  </div>

  <div id="info-panel" class="hidden">
    <div class="panel-header">
      <h2 id="info-name">—</h2>
      <button class="panel-toggle" onclick="this.closest('#info-panel').querySelector('.panel-body').classList.toggle('collapsed'); this.textContent = this.textContent === '\u2212' ? '+' : '\u2212';">&minus;</button>
    </div>
    <div class="panel-body" id="info-body">
      <span class="id-badge" id="info-id">—</span>
      <span class="quartier-badge" id="info-quartier">—</span>
      <div id="info-facilite"></div>
      <div class="indices" id="info-indices"></div>
      <div id="info-stats"></div>
      <div class="gang-info" id="info-gang"></div>
      <div id="info-game"></div>
      <div class="adj-list" id="info-adj"></div>
    </div>
  </div>

  <!-- Order Panel (Phase 1 & 4) -->
  <div id="order-panel" class="hidden"></div>

  <!-- Modal -->
  <div id="order-modal" class="overlay hidden">
    <div class="modal-content"><div class="modal-body"></div></div>
  </div>

  <!-- Curtain -->
  <div id="curtain" class="overlay hidden">
    <div class="curtain-phase"></div>
    <div class="curtain-label">Passez la tablette à</div>
    <div class="curtain-player"></div>
    <button class="btn-primary" id="btn-curtain-go" style="margin-top:32px">—</button>
  </div>

  <!-- Reveal -->
  <div id="reveal-ov" class="overlay hidden">
    <div class="reveal-container">
      <div class="reveal-title"></div>
      <div class="reveal-body"></div>
      <div class="reveal-btn"><button class="btn-primary" id="btn-reveal-ok">Continuer</button></div>
    </div>
  </div>

  <!-- Negotiation -->
  <div id="negotiation-ov" class="overlay hidden">
    <div class="nego-container">
      <div class="nego-title">Phase de négociation</div>
      <div class="nego-sub">Discutez entre joueurs : accords, menaces, alliances, contrats…<br>Le plateau est visible derrière cet écran.</div>
      <button class="btn-primary" id="btn-end-nego">Fin des négociations</button>
    </div>
  </div>

  <!-- Election -->
  <div id="election-ov" class="overlay hidden">
    <div class="election-container">
      <div class="election-body"></div>
    </div>
  </div>

  <!-- Turn End -->
  <div id="turnend-ov" class="overlay hidden">
    <div class="turnend-container">
      <div class="turnend-body"></div>
      <div class="reveal-btn"><button class="btn-primary" id="btn-next-turn">Tour suivant</button></div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
